<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optob - Login to Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-orange-50 to-gray-100 min-h-screen flex items-center justify-center">

  <div class="container mx-auto px-4 py-12 max-w-md">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-r from-orange-500 to-red-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-3">
        OR
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Optob<span class="text-orange-500">Ride</span></h1>
      <p class="text-gray-500 text-sm mt-1">Login to your referral dashboard</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-gradient-to-r from-orange-500 to-red-600 px-6 py-4">
        <h2 class="text-xl font-bold text-white"><i class="fas fa-sign-in-alt mr-2"></i> Login</h2>
      </div>
      <div class="p-6">
        <form id="loginForm">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
              <input type="email" id="loginEmail" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input type="password" id="loginPassword" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-bold py-3 rounded-xl hover:opacity-90 transition shadow-md">
              <i class="fas fa-arrow-right-to-bracket mr-2"></i> Login
            </button>
          </div>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
          No account? 
          <a href="register.html" class="text-orange-500 font-semibold hover:underline">Register here →</a>
        </p>
      </div>
    </div>

    <div id="errorMessage" class="hidden mt-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg text-center"></div>
  </div>

  <script>
    // SUPABASE CONFIGURATION
    const SUPABASE_URL = "https://thiksscedkfmqcpatedq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaWtzc2NlZGtmbXFjcGF0ZWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDc2NzYsImV4cCI6MjA5MjYyMzY3Nn0.zI5_7tWfdoNG700HOyK4eDrCMiITD9MXyqtMTImNJKA";
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      const { data: user, error } = await _supabase
        .from('referrers')
        .select('*')
        .eq('email', email)
        .eq('password', password)
        .single();
      
      if (error || !user) {
        document.getElementById('errorMessage').innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i> Invalid email or password. Please try again.';
        document.getElementById('errorMessage').classList.remove('hidden');
        setTimeout(() => {
          document.getElementById('errorMessage').classList.add('hidden');
        }, 3000);
        return;
      }
      
      // Save to localStorage and redirect to dashboard
      localStorage.setItem('optob_referrer', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
