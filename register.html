<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optob - Register & Get Referral Code</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-orange-50 to-gray-100 min-h-screen flex items-center justify-center">

  <div class="container mx-auto px-4 py-12 max-w-md">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-r from-orange-500 to-red-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-3">
        OR
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Optob<span class="text-orange-500">Ride</span></h1>
      <p class="text-gray-500 text-sm mt-1">Register to get your referral code</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-gradient-to-r from-orange-500 to-red-600 px-6 py-4">
        <h2 class="text-xl font-bold text-white"><i class="fas fa-user-plus mr-2"></i> Create Account</h2>
      </div>
      <div class="p-6">
        <form id="registerForm">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
              <input type="text" id="fullname" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
              <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
              <input type="tel" id="phone" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password (min 4 characters)</label>
              <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-bold py-3 rounded-xl hover:opacity-90 transition shadow-md">
              <i class="fas fa-gift mr-2"></i> Register & Get My Code
            </button>
          </div>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
          Already have an account? 
          <a href="login.html" class="text-orange-500 font-semibold hover:underline">Login here →</a>
        </p>
      </div>
    </div>

    <div id="successMessage" class="hidden mt-4 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg text-center"></div>
    <div id="errorMessage" class="hidden mt-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg text-center"></div>
  </div>

  <script>
    // SUPABASE CONFIGURATION
    const SUPABASE_URL = "https://thiksscedkfmqcpatedq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaWtzc2NlZGtmbXFjcGF0ZWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDc2NzYsImV4cCI6MjA5MjYyMzY3Nn0.zI5_7tWfdoNG700HOyK4eDrCMiITD9MXyqtMTImNJKA";
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function generateReferralCode(name) {
      const prefix = name.substring(0, 3).toUpperCase().replace(/[^A-Z]/g, 'X');
      const random = Math.random().toString(36).substring(2, 7).toUpperCase();
      return `${prefix}${random}`;
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      
      if (!fullname || !email || !phone || !password) {
        alert('Please fill all fields');
        return;
      }
      
      if (password.length < 4) {
        alert('Password must be at least 4 characters');
        return;
      }
      
      // Check if email exists
      const { data: existing } = await _supabase
        .from('referrers')
        .select('email')
        .eq('email', email)
        .single();
      
      if (existing) {
        document.getElementById('errorMessage').innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i> Email already registered! Please login.';
        document.getElementById('errorMessage').classList.remove('hidden');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
        return;
      }
      
      // Generate unique referral code
      let referralCode = generateReferralCode(fullname);
      let isUnique = false;
      while (!isUnique) {
        const { data: existing } = await _supabase
          .from('referrers')
          .select('referral_code')
          .eq('referral_code', referralCode)
          .single();
        if (!existing) isUnique = true;
        else referralCode = generateReferralCode(fullname);
      }
      
      // Insert new user
      const { data: newUser, error } = await _supabase
        .from('referrers')
        .insert([{
          fullname: fullname,
          email: email,
          phone: phone,
          password: password,
          referral_code: referralCode,
          referral_count: 0,
          earnings: 0
        }])
        .select()
        .single();
      
      if (error) {
        console.error(error);
        document.getElementById('errorMessage').innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i> Registration error: ' + error.message;
        document.getElementById('errorMessage').classList.remove('hidden');
        return;
      }
      
      // Save to localStorage and redirect to dashboard
      localStorage.setItem('optob_referrer', JSON.stringify(newUser));
      
      document.getElementById('successMessage').innerHTML = `✅ Registration successful! Your referral code: <strong>${referralCode}</strong><br>Redirecting to dashboard...`;
      document.getElementById('successMessage').classList.remove('hidden');
      
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 2000);
    });
  </script>
</body>
</html>
